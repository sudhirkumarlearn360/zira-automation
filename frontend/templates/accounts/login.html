{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper" style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0052cc 0%, #0065ff 100%);">
    <div class="auth-card" style="background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); width: 400px; backdrop-filter: blur(10px);">
        <h2 style="margin-top: 0; color: #172b4d; text-align: center; margin-bottom: 30px;">Welcome Back</h2>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 12px; font-weight: 600; color: #5e6c84; margin-bottom: 6px; text-transform: uppercase;">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div style="color: #de350b; font-size: 12px; margin-top: 4px;">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
            {% endfor %}
            
            <button type="submit" style="width: 100%; padding: 12px; background: #0052cc; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s;">
                Log In
            </button>
        </form>

        <div style="margin-top: 20px; text-align: center; font-size: 14px; color: #5e6c84;">
            <a href="{% url 'password_reset' %}" style="color: #0052cc; text-decoration: none;">Forgot password?</a>
            <span style="margin: 0 10px;">•</span>
            <a href="{% url 'signup' %}" style="color: #0052cc; text-decoration: none;">Sign up</a>
        </div>
    </div>
</div>

<style>
    /* Input Styling Override */
    input[type="text"], input[type="password"], input[type="email"] {
        width: 100%;
        padding: 10px;
        border: 2px solid #dfe1e6;
        border-radius: 4px;
        background: #fafbfc;
        font-size: 14px;
        box-sizing: border-box; /* Fix padding issue */
        transition: border 0.2s;
    }
    input:focus {
        border-color: #0052cc;
        outline: none;
        background: white;
    }
</style>
{% endblock %}
