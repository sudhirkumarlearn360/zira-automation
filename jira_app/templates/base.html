<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jira Orchestrator</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f4f5f7; 
            margin: 0; 
            padding: 0; /* Remove body padding */
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll */
        }

        /* Fixed Header Area */
        .app-header {
            background: #ffffff;
            padding: 10px 20px;
            border-bottom: 1px solid #dfe1e6;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .app-header h1 { margin: 0; font-size: 18px; color: #172b4d; }
        .app-header h2 { margin: 0; font-size: 14px; color: #5e6c84; font-weight: normal; }

        /* Main Content Area */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden; /* Columns scroll independently */
            padding: 10px;
            gap: 10px;
            padding-bottom: 80px; /* Space for footer */
        }

        .column-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ebecf0;
            border-radius: 6px;
            overflow: hidden; /* Contain scrollable list */
        }

        .column-header {
            padding: 10px;
            font-weight: bold;
            color: #5e6c84;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid #dfe1e6;
            background: #f4f5f7;
            flex-shrink: 0;
        }

        .story-list {
            flex: 1;
            overflow-y: auto; /* Independent scroll */
            padding: 8px;
        }

        /* Drag Over Effect */
        .column-container.drag-over { background: #dfe1e6; border: 2px dashed #0052cc; }

        .card { 
            background: white; 
            padding: 12px; 
            margin-bottom: 6px; 
            border-radius: 3px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            cursor: grab; 
            font-size: 14px;
        }
        .card:hover { background: #f4f5f7; }
        .card:active { cursor: grabbing; }

        /* Fixed Footer */
        .controls { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #ffffff; 
            border-top: 1px solid #dfe1e6; 
            padding: 12px 20px; 
            box-shadow: 0 -4px 12px rgba(9, 30, 66, 0.15); 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            z-index: 100;
        }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(9, 30, 66, 0.54); justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: white; padding: 20px; width: 600px; max-width: 90%; max-height: 80vh; overflow-y: auto; border-radius: 3px; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end; }
        
        select { padding: 6px; border-radius: 3px; border: 1px solid #dfe1e6; background: #fafbfc; font-size: 14px; }
        button { padding: 8px 16px; border-radius: 3px; border: none; font-weight: bold; cursor: pointer; }
        button#previewBtn { background: #0052cc; color: white; }
        button.btn-secondary { background: rgba(9, 30, 66, 0.08); color: #42526e; }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>Jira Orchestrator</h1>
        {% block header_extra %}{% endblock %}
    </div>
    {% block content %}
    {% endblock %}
</body>
</html>
